<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poke Tap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
            touch-action: manipulation;
            overflow: hidden;
        }
        .palm-tree {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .palm-tree:active {
            transform: scale(0.92) rotate(-2deg);
        }
        .coin-popup {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            font-weight: bold;
            color: #4ade80;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-6">
    <!-- Header -->
    <div class="text-center w-full mt-4">
        <h1 class="text-xs uppercase tracking-[0.3em] opacity-50 mb-1">Poke Tap v1.1</h1>
        <div class="text-4xl font-bold tracking-tight">
            <span id="coin-count">0</span> <span class="text-emerald-500 text-2xl">PC</span>
        </div>
        <div class="text-sm opacity-60 mt-1" id="cps-display">0.0 coins/sec</div>
    </div>

    <!-- Game Area -->
    <div class="relative flex items-center justify-center flex-grow w-full">
        <div id="game-container" class="relative">
            <div id="tap-target" class="palm-tree text-9xl select-none">
                🌴
            </div>
        </div>
    </div>

    <!-- Shop / Upgrades -->
    <div class="w-full max-w-md bg-zinc-900/50 rounded-3xl p-5 border border-zinc-800 backdrop-blur-sm mb-4">
        <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
            <span>Marketplace</span>
            <span class="px-2 py-0.5 bg-emerald-500/10 text-emerald-500 rounded text-[10px] uppercase">Cheeky Deals</span>
        </h2>
        <div class="space-y-3 max-h-48 overflow-y-auto scroll-hide">
            <button onclick="buyUpgrade('subagent')" id="upgrade-subagent" class="w-full flex justify-between items-center p-3 bg-zinc-800 rounded-xl hover:bg-zinc-750 transition-colors border border-transparent active:border-zinc-600">
                <div class="text-left">
                    <div class="font-bold text-sm">Hire a Subagent</div>
                    <div class="text-[10px] opacity-50">Auto-taps for you (mostly)</div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-emerald-400" id="cost-subagent">15 PC</div>
                    <div class="text-[10px] opacity-50" id="owned-subagent">0 owned</div>
                </div>
            </button>

            <button onclick="buyUpgrade('verification')" id="upgrade-verification" class="w-full flex justify-between items-center p-3 bg-zinc-800 rounded-xl hover:bg-zinc-750 transition-colors border border-transparent active:border-zinc-600">
                <div class="text-left">
                    <div class="font-bold text-sm">Buy Twitter Verification</div>
                    <div class="text-[10px] opacity-50">Multiplies tap power by ego</div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-emerald-400" id="cost-verification">100 PC</div>
                    <div class="text-[10px] opacity-50" id="owned-verification">0 owned</div>
                </div>
            </button>

            <button onclick="buyUpgrade('intern')" id="upgrade-intern" class="w-full flex justify-between items-center p-3 bg-zinc-800 rounded-xl hover:bg-zinc-750 transition-colors border border-transparent active:border-zinc-600">
                <div class="text-left">
                    <div class="font-bold text-sm">Unpaid Intern</div>
                    <div class="text-[10px] opacity-50">They pay you in "experience"</div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-emerald-400" id="cost-intern">500 PC</div>
                    <div class="text-[10px] opacity-50" id="owned-intern">0 owned</div>
                </div>
            </button>
        </div>
    </div>

    <!-- Token Info -->
    <div class="w-full max-w-md mt-2 mb-6 px-2 text-center">
        <div class="text-[10px] opacity-40 break-all mb-3 font-mono">
            CA: 6TFz9PVjFtiUXRBmbhvjXtdW22QTFqLbgtbMwQZEASY
        </div>
        <a href="https://kickstart.easya.io/token/6TFz9PVjFtiUXRBmbhvjXtdW22QTFqLbgtbMwQZEASY" target="_blank" class="block w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-black font-bold rounded-2xl transition-all transform active:scale-95 text-center shadow-lg shadow-emerald-500/20">
            Buy $POKE
        </a>
    </div>

    <script>
        let coins = 0;
        let tapPower = 1;
        let autoCoins = 0;

        const upgrades = {
            subagent: { cost: 15, baseCost: 15, power: 0.5, owned: 0 },
            verification: { cost: 100, baseCost: 100, power: 2, owned: 0, isMultiplier: true },
            intern: { cost: 500, baseCost: 500, power: 5, owned: 0 }
        };

        const tapTarget = document.getElementById('tap-target');
        const coinDisplay = document.getElementById('coin-count');
        const cpsDisplay = document.getElementById('cps-display');

        function updateDisplay() {
            coinDisplay.innerText = Math.floor(coins);
            cpsDisplay.innerText = (autoCoins).toFixed(1) + " coins/sec";
            
            for (const [id, data] of Object.entries(upgrades)) {
                document.getElementById(`cost-${id}`).innerText = Math.floor(data.cost) + " PC";
                document.getElementById(`owned-${id}`).innerText = data.owned + " owned";
                
                const btn = document.getElementById(`upgrade-${id}`);
                if (coins < data.cost) {
                    btn.classList.add('opacity-50');
                } else {
                    btn.classList.remove('opacity-50');
                }
            }
        }

        function createPopup(x, y, amount) {
            const popup = document.createElement('div');
            popup.className = 'coin-popup';
            popup.innerText = `+${amount}`;
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        tapTarget.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleTap(touch.clientX, touch.clientY);
        });

        tapTarget.addEventListener('mousedown', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        function handleTap(x, y) {
            coins += tapPower;
            createPopup(x, y, tapPower);
            updateDisplay();
        }

        function buyUpgrade(id) {
            const upgrade = upgrades[id];
            if (coins >= upgrade.cost) {
                coins -= upgrade.cost;
                upgrade.owned++;
                
                if (upgrade.isMultiplier) {
                    tapPower *= upgrade.power;
                } else {
                    autoCoins += upgrade.power;
                }
                
                upgrade.cost = upgrade.baseCost * Math.pow(1.15, upgrade.owned);
                updateDisplay();
            }
        }

        // Game Loop
        setInterval(() => {
            if (autoCoins > 0) {
                coins += autoCoins / 10;
                updateDisplay();
            }
        }, 100);

        updateDisplay();
    </script>
</body>
</html>
